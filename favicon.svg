<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="32" height="32">
  <!-- Cream rounded background -->
  <rect width="64" height="64" fill="#F5EDD8" rx="8"/>

  <!-- Tent roof: green stripes clipped to triangle -->
  <defs>
    <clipPath id="fav-roof">
      <polygon points="32,8 58,34 6,34"/>
    </clipPath>
  </defs>
  <g clip-path="url(#fav-roof)">
    <rect x="6" y="8"  width="52" height="26" fill="#F5EDD8"/>
    <rect x="6" y="12" width="52" height="4"  fill="#2F7A3A"/>
    <rect x="6" y="20" width="52" height="4"  fill="#2F7A3A"/>
    <rect x="6" y="28" width="52" height="4"  fill="#2F7A3A"/>
  </g>
  <!-- Roof outline -->
  <polygon points="32,8 58,34 6,34" fill="none" stroke="#2A1A0E" stroke-width="2"/>

  <!-- Table / display shelf -->
  <rect x="8" y="46" width="48" height="3" fill="#7A4A28" stroke="#2A1A0E" stroke-width="1"/>

  <!-- Produce: tomato, cantaloupe, tomato -->
  <circle cx="20" cy="41" r="4" fill="#B8232A"    stroke="#2A1A0E" stroke-width="1.5"/>
  <circle cx="32" cy="41" r="4" fill="#F2C438" stroke="#2A1A0E" stroke-width="1.5"/>
  <circle cx="44" cy="41" r="4" fill="#B8232A"    stroke="#2A1A0E" stroke-width="1.5"/>
</svg>