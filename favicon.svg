<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Everyday Produce Market favicon — full EPTent illustration -->
  <!-- Matches EPFaviconMark simplified=false (64px) from deliverables.jsx -->

  <!-- Cream rounded background -->
  <rect width="200" height="200" fill="#F5EDD8" rx="24"/>

  <!-- Tent roof: green/cream alternating stripes, clipped to triangle -->
  <defs>
    <clipPath id="ep-roof-clip">
      <polygon points="100,12 180,80 20,80"/>
    </clipPath>
  </defs>
  <g clip-path="url(#ep-roof-clip)">
    <rect x="20" y="12" width="160" height="68" fill="#F5EDD8"/>
    <rect x="20" y="12" width="160" height="14" fill="#2F7A3A"/>
    <rect x="20" y="26" width="160" height="14" fill="#F5EDD8"/>
    <rect x="20" y="40" width="160" height="14" fill="#2F7A3A"/>
    <rect x="20" y="54" width="160" height="14" fill="#F5EDD8"/>
    <rect x="20" y="68" width="160" height="12" fill="#2F7A3A"/>
  </g>
  <!-- Roof outline -->
  <polygon points="100,12 180,80 20,80" fill="none" stroke="#2A1A0E" stroke-width="2" stroke-linejoin="miter"/>

  <!-- Tent poles -->
  <line x1="24" y1="80" x2="24" y2="178" stroke="#5A3518" stroke-width="3" stroke-linecap="square"/>
  <line x1="176" y1="80" x2="176" y2="178" stroke="#5A3518" stroke-width="3" stroke-linecap="square"/>
  <line x1="24" y1="80" x2="24" y2="178" stroke="#2A1A0E" stroke-width="1"/>
  <line x1="176" y1="80" x2="176" y2="178" stroke="#2A1A0E" stroke-width="1"/>
  <!-- Cross-brace under eave -->
  <line x1="24" y1="82" x2="176" y2="82" stroke="#5A3518" stroke-width="2"/>
  <line x1="24" y1="82" x2="176" y2="82" stroke="#2A1A0E" stroke-width="0.5"/>

  <!-- Hanging flower baskets (3) -->
  <!-- Left: red -->
  <line x1="55" y1="80" x2="55" y2="92" stroke="#2A1A0E" stroke-width="1.2"/>
  <polygon points="45,92 65,92 63,104 47,104" fill="#7A4A28" stroke="#2A1A0E" stroke-width="2" stroke-linejoin="miter"/>
  <rect x="44" y="90" width="22" height="3" fill="#5A3518" stroke="#2A1A0E" stroke-width="2"/>
  <circle cx="51" cy="89" r="2.5" fill="#B8232A" stroke="#2A1A0E" stroke-width="1"/>
  <circle cx="59" cy="89" r="2.5" fill="#B8232A" stroke="#2A1A0E" stroke-width="1"/>
  <circle cx="55" cy="86" r="2.5" fill="#B8232A" stroke="#2A1A0E" stroke-width="1"/>
  <!-- Center: yellow -->
  <line x1="100" y1="80" x2="100" y2="92" stroke="#2A1A0E" stroke-width="1.2"/>
  <polygon points="90,92 110,92 108,104 92,104" fill="#7A4A28" stroke="#2A1A0E" stroke-width="2" stroke-linejoin="miter"/>
  <rect x="89" y="90" width="22" height="3" fill="#5A3518" stroke="#2A1A0E" stroke-width="2"/>
  <circle cx="96" cy="89" r="2.5" fill="#F2C438" stroke="#2A1A0E" stroke-width="1"/>
  <circle cx="104" cy="89" r="2.5" fill="#F2C438" stroke="#2A1A0E" stroke-width="1"/>
  <circle cx="100" cy="86" r="2.5" fill="#F2C438" stroke="#2A1A0E" stroke-width="1"/>
  <!-- Right: red -->
  <line x1="145" y1="80" x2="145" y2="92" stroke="#2A1A0E" stroke-width="1.2"/>
  <polygon points="135,92 155,92 153,104 137,104" fill="#7A4A28" stroke="#2A1A0E" stroke-width="2" stroke-linejoin="miter"/>
  <rect x="134" y="90" width="22" height="3" fill="#5A3518" stroke="#2A1A0E" stroke-width="2"/>
  <circle cx="141" cy="89" r="2.5" fill="#B8232A" stroke="#2A1A0E" stroke-width="1"/>
  <circle cx="149" cy="89" r="2.5" fill="#B8232A" stroke="#2A1A0E" stroke-width="1"/>
  <circle cx="145" cy="86" r="2.5" fill="#B8232A" stroke="#2A1A0E" stroke-width="1"/>

  <!-- Table (spans under tent) -->
  <rect x="24" y="138" width="152" height="8" fill="#7A4A28" stroke="#2A1A0E" stroke-width="2" stroke-linejoin="miter"/>
  <rect x="30"  y="146" width="4" height="28" fill="#5A3518" stroke="#2A1A0E" stroke-width="1.5"/>
  <rect x="166" y="146" width="4" height="28" fill="#5A3518" stroke="#2A1A0E" stroke-width="1.5"/>
  <rect x="98"  y="146" width="4" height="28" fill="#5A3518" stroke="#2A1A0E" stroke-width="1.5"/>

  <!-- Left basket: tomatoes -->
  <polygon points="40,128 82,128 78,138 44,138" fill="#7A4A28" stroke="#2A1A0E" stroke-width="2" stroke-linejoin="miter"/>
  <line x1="48" y1="130" x2="46" y2="138" stroke="#5A3518" stroke-width="1"/>
  <line x1="56" y1="130" x2="55" y2="138" stroke="#5A3518" stroke-width="1"/>
  <line x1="64" y1="130" x2="64" y2="138" stroke="#5A3518" stroke-width="1"/>
  <line x1="72" y1="130" x2="73" y2="138" stroke="#5A3518" stroke-width="1"/>
  <circle cx="50" cy="124" r="6"   fill="#B8232A" stroke="#2A1A0E" stroke-width="2"/>
  <circle cx="61" cy="121" r="6.5" fill="#B8232A" stroke="#2A1A0E" stroke-width="2"/>
  <circle cx="72" cy="124" r="6"   fill="#B8232A" stroke="#2A1A0E" stroke-width="2"/>
  <polygon points="49,119 51,116 53,119" fill="#2F7A3A" stroke="#2A1A0E" stroke-width="1"/>
  <polygon points="60,116 62,113 64,116" fill="#2F7A3A" stroke="#2A1A0E" stroke-width="1"/>
  <polygon points="71,119 73,116 75,119" fill="#2F7A3A" stroke="#2A1A0E" stroke-width="1"/>

  <!-- Right pile: cantaloupes -->
  <circle cx="118" cy="128" r="7" fill="#F2C438" stroke="#2A1A0E" stroke-width="2"/>
  <circle cx="132" cy="128" r="7" fill="#F2C438" stroke="#2A1A0E" stroke-width="2"/>
  <circle cx="146" cy="128" r="7" fill="#F2C438" stroke="#2A1A0E" stroke-width="2"/>
  <circle cx="160" cy="128" r="7" fill="#F2C438" stroke="#2A1A0E" stroke-width="2"/>
  <circle cx="125" cy="136" r="7" fill="#F2C438" stroke="#2A1A0E" stroke-width="2"/>
  <circle cx="139" cy="136" r="7" fill="#F2C438" stroke="#2A1A0E" stroke-width="2"/>
  <circle cx="153" cy="136" r="7" fill="#F2C438" stroke="#2A1A0E" stroke-width="2"/>
  <circle cx="132" cy="120" r="6" fill="#F2C438" stroke="#2A1A0E" stroke-width="2"/>
  <circle cx="146" cy="120" r="6" fill="#F2C438" stroke="#2A1A0E" stroke-width="2"/>
  <circle cx="139" cy="113" r="5.5" fill="#F2C438" stroke="#2A1A0E" stroke-width="2"/>

  <!-- Watermelons on the ground -->
  <line x1="20" y1="180" x2="180" y2="180" stroke="#2A1A0E" stroke-width="1" opacity="0.3"/>
  <!-- Left -->
  <ellipse cx="70" cy="178" rx="18" ry="8" fill="#1F5228" stroke="#2A1A0E" stroke-width="2"/>
  <path d="M 56,176 Q 60,172 64,176" fill="none" stroke="#3D8A4A" stroke-width="1.5"/>
  <path d="M 66,175 Q 70,171 74,175" fill="none" stroke="#3D8A4A" stroke-width="1.5"/>
  <path d="M 76,176 Q 80,172 84,176" fill="none" stroke="#3D8A4A" stroke-width="1.5"/>
  <!-- Center -->
  <ellipse cx="100" cy="182" rx="18" ry="8" fill="#1F5228" stroke="#2A1A0E" stroke-width="2"/>
  <path d="M 86,180 Q 90,176 94,180" fill="none" stroke="#3D8A4A" stroke-width="1.5"/>
  <path d="M 96,179 Q 100,175 104,179" fill="none" stroke="#3D8A4A" stroke-width="1.5"/>
  <path d="M 106,180 Q 110,176 114,180" fill="none" stroke="#3D8A4A" stroke-width="1.5"/>
  <!-- Right -->
  <ellipse cx="130" cy="178" rx="18" ry="8" fill="#1F5228" stroke="#2A1A0E" stroke-width="2"/>
  <path d="M 116,176 Q 120,172 124,176" fill="none" stroke="#3D8A4A" stroke-width="1.5"/>
  <path d="M 126,175 Q 130,171 134,175" fill="none" stroke="#3D8A4A" stroke-width="1.5"/>
  <path d="M 136,176 Q 140,172 144,176" fill="none" stroke="#3D8A4A" stroke-width="1.5"/>
</svg>
