<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .not-found {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      padding: 2rem;
    }
    .not-found h1 { font-size: 4rem; margin: 0; opacity: 0.2; }
    .not-found p  { margin-top: 0.5rem; }
    .not-found a  { display: inline-block; margin-top: 1.5rem; }
  </style>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body>
  <main>
    <div class="not-found">
      <h1>404</h1>
      <p>That page doesn't exist.</p>
      <a href="/">Back to home</a>
    </div>
  </main>
  <footer>
    <p class="site-credit">Designed in KCMO &mdash; <a href="https://simonlpaige.com" rel="noopener">simonlpaige.com</a></p>
  </footer>
</body>
</html>
