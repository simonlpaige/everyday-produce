<?xml version="1.0" encoding="UTF-8"?>
<!-- Concept C: The Wordmark. Typography-led, modern, signage-friendly. Leaf-dot replaces the dot on the 'y' descender of Everyday. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" role="img" aria-label="Everyday Produce wordmark with leaf mark">
  <defs>
    <style>
      .word-main {
        font-family: 'Playfair Display', Georgia, serif;
        font-weight: 800;
        font-size: 110px;
        fill: #2c2417;
        letter-spacing: -0.02em;
      }
      .word-accent {
        font-family: 'Playfair Display', Georgia, serif;
        font-weight: 600;
        font-style: italic;
        font-size: 46px;
        fill: #3d7a4a;
        letter-spacing: 0.02em;
      }
      .word-sub {
        font-family: 'DM Sans', sans-serif;
        font-weight: 500;
        font-size: 15px;
        fill: #5c4a32;
        letter-spacing: 0.38em;
      }
      .leaf-mark { fill: #3d7a4a; }
      .leaf-vein { fill: none; stroke: #faf7f2; stroke-width: 1.8; stroke-linecap: round; }
      .divider { stroke: #d4a843; stroke-width: 2; }
    </style>
  </defs>

  <!-- Main wordmark: "Everyday" -->
  <text class="word-main" x="50" y="140">Everyday</text>

  <!-- Leaf mark sitting above the 'y' where a hanging ornament would go -->
  <!-- The 'y' in Playfair sits around x=335 of this string; leaf floats slightly above and right -->
  <g transform="translate(440, 55) rotate(25)">
    <path class="leaf-mark" d="M 0,-18 Q 14,-12 15,0 Q 14,12 0,18 Q -14,12 -15,0 Q -14,-12 0,-18 Z"/>
    <path class="leaf-vein" d="M -10,8 Q 0,0 11,-10"/>
  </g>

  <!-- Small decorative rule -->
  <line class="divider" x1="50" y1="170" x2="130" y2="170"/>
  <line class="divider" x1="470" y1="170" x2="550" y2="170"/>

  <!-- Secondary word: italic "Produce" -->
  <text class="word-accent" x="150" y="182" text-anchor="start">Produce</text>

  <!-- Tagline -->
  <text class="word-sub" x="300" y="225" text-anchor="middle">WALDO  ·  KANSAS CITY  ·  EST. 1985</text>

  <!-- Micro tag -->
  <text class="word-sub" x="300" y="255" text-anchor="middle" style="font-size:12px; letter-spacing:0.28em; fill:#635b50;">HAND  PICKED  ·  LOCAL  FARMS</text>
</svg>
