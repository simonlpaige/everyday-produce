<?xml version="1.0" encoding="UTF-8"?>
<!-- Concept A v2: The Stamp. Simpler, bolder. Center mark dominates; curved text sized up; cream fill stays legible on dark. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Everyday Produce, established 1985, Waldo Kansas City">
  <defs>
    <style>
      .bg { fill: #faf7f2; }
      .ring-outer { fill: none; stroke: #3d7a4a; stroke-width: 6; }
      .ring-inner { fill: none; stroke: #3d7a4a; stroke-width: 3; }
      .arc-text {
        font-family: 'Playfair Display', Georgia, serif;
        font-weight: 700;
        font-size: 32px;
        fill: #2c2417;
        letter-spacing: 0.22em;
      }
      .arc-text-bottom {
        font-family: 'DM Sans', sans-serif;
        font-weight: 600;
        font-size: 20px;
        fill: #5c4a32;
        letter-spacing: 0.28em;
      }
      .center-year {
        font-family: 'Playfair Display', Georgia, serif;
        font-weight: 800;
        font-size: 64px;
        fill: #3d7a4a;
        text-anchor: middle;
      }
      .center-sub {
        font-family: 'DM Sans', sans-serif;
        font-weight: 600;
        font-size: 14px;
        fill: #5c4a32;
        text-anchor: middle;
        letter-spacing: 0.28em;
      }
      .star { fill: #d4a843; }
    </style>
    <!-- Circular text paths. Top arc rides inside the inner ring; bottom arc pulled up so letters stay inside the ring. -->
    <path id="arc-top" d="M 64,200 A 136,136 0 0 1 336,200" fill="none" />
    <path id="arc-bottom" d="M 76,208 A 124,124 0 0 0 324,208" fill="none" />
  </defs>

  <!-- Cream disc -->
  <circle class="bg" cx="200" cy="200" r="190"/>

  <!-- Rings -->
  <circle class="ring-outer" cx="200" cy="200" r="184"/>
  <circle class="ring-inner" cx="200" cy="200" r="166"/>

  <!-- Top curved text -->
  <text class="arc-text">
    <textPath href="#arc-top" startOffset="50%" text-anchor="middle">EVERYDAY  PRODUCE</textPath>
  </text>

  <!-- Bottom curved text -->
  <text class="arc-text-bottom">
    <textPath href="#arc-bottom" startOffset="50%" text-anchor="middle">WALDO  ·  KANSAS CITY</textPath>
  </text>

  <!-- Flanking separator dots (replace stars; smaller, sit on the inner ring between top and bottom curves so they don't overlap letters) -->
  <g class="star">
    <circle cx="34" cy="200" r="4"/>
    <circle cx="366" cy="200" r="4"/>
  </g>

  <!-- Center: big EST. 1985 -->
  <text class="center-sub" x="200" y="175">— EST —</text>
  <text class="center-year" x="200" y="235">1985</text>
  <text class="center-sub" x="200" y="265">HAND PICKED LOCAL</text>
</svg>
